services:
  db:
    image: postgres:16-alpine
    container_name: suoac-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: suoac
      POSTGRES_PASSWORD: suoac_dev
      POSTGRES_DB: suoac_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U suoac -d suoac_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: suoac-api
    build:
      context: .
      target: deps
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://suoac:suoac_dev@db:5432/suoac_dev
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run start:dev"

volumes:
  pgdata:
