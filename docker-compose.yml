# ============================================================
# SUOAC Backend - Docker Compose (Desenvolvimento)
# ============================================================
# Uso: docker compose up -d
# Sobe apenas o PostgreSQL para desenvolvimento local.
# A API roda localmente com: npm run start:dev
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: suoac-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: suoac
      POSTGRES_PASSWORD: suoac_dev
      POSTGRES_DB: suoac_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U suoac -d suoac_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
